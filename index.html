<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8eaf0;font-family:Georgia,serif;padding:20px}
.wrap{max-width:680px;margin:0 auto}
h1{font-size:24px;font-weight:normal;margin-bottom:4px}

.card{background:#161920;border:1px solid #252836;border-radius:12px;padding:24px 28px;margin-bottom:16px}

.qnum{font-size:11px;letter-spacing:.15em;color:#4b5563;margin-bottom:10px}

.choice{display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:9px;border-radius:8px;border:1px solid #252836;background:#1e2230;color:#b0b8cc;font-size:14px;cursor:pointer;font-family:Georgia,serif;line-height:1.4}

.choice.wrong{border-color:#ef4444;background:#2a0d0d;color:#fca5a5;cursor:default}
.choice.dim{border-color:#252836;background:#1e2230;color:#4b5563;cursor:default}
.feedback{margin-top:14px;padding:10px 16px;border-radius:8px;font-size:14px}

.feedback.no{background:#2a0d0d;border:1px solid #ef4444;color:#fca5a5}
.btns{margin-top:18px;display:flex;gap:10px}

.btn-act.off{background:#1e2230;color:#4b5563;border-color:#2e3347;cursor:default}
.ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;border:8px solid #4f6ef7}

.wrong-item{margin-bottom:16px;padding:14px 18px;background:#1a1520;border:1px solid #2e2030;border-radius:10px}
.wrong-q{font-size:13px;color:#c9cfe0;margin-bottom:6px;line-height:1.5}
.wrong-c{font-size:12px;color:#fca5a5;margin-bottom:3px}
.wrong-a{font-size:12px;color:#86efac}
.btn-back{padding:11px 28px;background:transparent;color:#6b7280;border:1px solid #2e3347;border-radius:8px;font-size:14px;cursor:pointer;margin-top:20px;font-family:Georgia,serif}

</style>
</head>

<script>
const SECS=[[0,39],[40,59],[60,74],[75,109],[110,119],[120,124]];
let doShuf=true,qs=[],cur=0,sel=null,conf=false,score=0,wrongs=[];

const Q=[
{"q":"1. Which type of muscle tissue is characterized as being voluntary and controlled by the central nervous system?","c":["A) Smooth muscle","B) Cardiac muscle","C) Skeletal muscle","D) Non-striated muscle","E) Visceral muscle"],"a":"C) Skeletal muscle"},
{"q":"2. What is the connective tissue layer that surrounds an entire muscle?","c":["A) Endomysium","B) Perimysium","C) Epimysium","D) Sarcolemma","E) Aponeurosis"],"a":"C) Epimysium"},
{"q":"3. A bundle of muscle fibers is known as a:","c":["A) Myofibril","B) Fascicle","C) Sarcomere","D) Myofilament","E) Triad"],"a":"B) Fascicle"},
{"q":"4. Which of the following describes an aponeurosis?","c":["A) A cord-like bundle of connective tissue","B) A cell membrane surrounding a muscle fiber","C) A broad, sheet-like muscle attachment","D) The cytoplasm of a muscle cell","E) A contractile unit of a myofibril"],"a":"C) A broad, sheet-like muscle attachment"},
{"q":"5. The cell membrane of a skeletal muscle fiber is called the:","c":["A) Sarcoplasm","B) Sarcoplasmic reticulum","C) Sarcolemma","D) Perimysium","E) T tubule"],"a":"C) Sarcolemma"},
{"q":"6. Which structure helps transmit the action potential deep into the muscle cell?","c":["A) Myofibrils","B) Transverse (T) tubules","C) Myofilaments","D) Z lines","E) Actin"],"a":"B) Transverse (T) tubules"},
{"q":"7. Myofibrils are primarily composed of bundles of:","c":["A) Fascicles","B) Myofilaments","C) Mitochondria","D) Epimysium","E) Sarcolemmas"],"a":"B) Myofilaments"},
{"q":"8. Which protein is the primary component of thick filaments?","c":["A) Actin","B) Troponin","C) Tropomyosin","D) Myosin","E) Creatine"],"a":"D) Myosin"},
{"q":"9. The functional unit of a skeletal muscle fiber is the:","c":["A) Sarcolemma","B) Sarcoplasm","C) Sarcomere","D) Myofibril","E) Fascicle"],"a":"C) Sarcomere"},
{"q":"10. In a sarcomere, the dark bands composed of thick filaments are called:","c":["A) I bands","B) Z lines","C) A bands","D) H bands","E) M lines"],"a":"C) A bands"},
{"q":"11. Which area of the sarcomere contains only thick filaments and no thin filaments?","c":["A) Zone of overlap","B) H band","C) I band","D) Z line","E) A band"],"a":"B) H band"},
{"q":"12. What is the function of the sarcoplasmic reticulum (SR) in muscle contraction?","c":["A) To produce ATP","B) To transmit electrical signals","C) To store and release calcium ions","D) To bind to acetylcholine","E) To anchor the muscle to bone"],"a":"C) To store and release calcium ions"},
{"q":"13. A 'triad' in a muscle fiber consists of:","c":["A) Two actin and one myosin filament","B) One T tubule and two terminal cisternae","C) Three sarcomeres in a row","D) Epimysium, perimysium, and endomysium","E) Myosin, actin, and tropomyosin"],"a":"B) One T tubule and two terminal cisternae"},
{"q":"14. Muscle contraction is directly caused by the interaction between:","c":["A) The sarcolemma and T tubules","B) Myosin and actin filaments","C) Acetylcholine and cholinesterase","D) ATP and CP","E) Epimysium and perimysium"],"a":"B) Myosin and actin filaments"},
{"q":"15. The communication link between a neuron and a skeletal muscle fiber occurs at the:","c":["A) Sarcoplasmic reticulum","B) Myofibril","C) Neuromuscular junction","D) Sarcomere","E) Z line"],"a":"C) Neuromuscular junction"},
{"q":"16. What neurotransmitter is released to initiate skeletal muscle contraction?","c":["A) Dopamine","B) Serotonin","C) Acetylcholine","D) Epinephrine","E) Creatine phosphokinase"],"a":"C) Acetylcholine"},
{"q":"17. Which of the following is the first step in the contraction cycle?","c":["A) Formation of cross-bridges","B) Pivoting of myosin heads","C) Exposure of active sites","D) Detachment of cross-bridges","E) Reactivation of myosin"],"a":"C) Exposure of active sites"},
{"q":"18. What causes the myosin head to detach from the actin?","c":["A) The release of calcium","B) Binding of a new ATP molecule","C) The breakdown of acetylcholine","D) The pivoting of the head","E) Exposure of active sites"],"a":"B) Binding of a new ATP molecule"},
{"q":"19. What is the primary energy source for a resting muscle?","c":["A) Anaerobic glycolysis","B) Aerobic metabolism of fatty acids","C) Creatine phosphate depletion","D) Lactic acid fermentation","E) Acetylcholine breakdown"],"a":"B) Aerobic metabolism of fatty acids"},
{"q":"20. How many ATP molecules are typically produced per glucose through aerobic metabolism?","c":["A) 2","B) 4","C) 34","D) 100","E) 0"],"a":"C) 34"},
{"q":"21. Anaerobic glycolysis occurs in the:","c":["A) Mitochondria","B) Sarcoplasmic reticulum","C) Cytoplasm","D) Synaptic cleft","E) T tubules"],"a":"C) Cytoplasm"},
{"q":"22. What build-up contributes to low pH and muscle fatigue?","c":["A) Oxygen","B) ATP","C) Lactic acid","D) Creatine phosphate","E) Glucose"],"a":"C) Lactic acid"},
{"q":"23. 'Oxygen debt' refers to:","c":["A) Oxygen needed to stop a contraction","B) Oxygen required to restore normal metabolic conditions after exercise","C) Oxygen trapped in the T tubules","D) A lack of oxygen in the atmosphere","E) Oxygen stored in the SR"],"a":"B) Oxygen required to restore normal metabolic conditions after exercise"},
{"q":"24. The muscle attachment that remains relatively fixed during contraction is the:","c":["A) Insertion","B) Synergist","C) Origin","D) Antagonist","E) Prime mover"],"a":"C) Origin"},
{"q":"25. A muscle that opposes a particular movement is known as a(n):","c":["A) Agonist","B) Synergist","C) Antagonist","D) Prime mover","E) Fixator"],"a":"C) Antagonist"},
{"q":"26. Which muscle is an exception — its name doesn't include 'muscle'?","c":["A) Biceps brachii","B) Diaphragm","C) Deltoid","D) Triceps brachii","E) Rectus femoris"],"a":"B) Diaphragm"},
{"q":"27. The term 'sarcopenia' refers to:","c":["A) Muscle growth due to exercise","B) The loss of muscle mass due to aging","C) The accumulation of lactic acid","D) The structure of a sarcomere","E) The regeneration of muscle fibers"],"a":"B) The loss of muscle mass due to aging"},
{"q":"28. By age 80, approximately what percentage of muscle mass is lost?","c":["A) 10%","B) 25%","C) 50%","D) 75%","E) 90%"],"a":"C) 50%"},
{"q":"29. Which layer of connective tissue surrounds individual muscle cells?","c":["A) Epimysium","B) Perimysium","C) Endomysium","D) Deep fascia","E) Aponeurosis"],"a":"C) Endomysium"},
{"q":"30. Which enzyme recharges ADP back into ATP using creatine phosphate?","c":["A) Acetylcholinesterase","B) Creatine phosphokinase","C) Amylase","D) Myosin ATPase","E) Lactic acid dehydrogenase"],"a":"B) Creatine phosphokinase"},
{"q":"31. Which of these is a function of skeletal muscle?","c":["A) Maintain body temperature","B) Pump blood through the body","C) Decrease blood pressure","D) Filter wastes from the blood","E) Produce hormones"],"a":"A) Maintain body temperature"},
{"q":"32. The area between two Z lines is a:","c":["A) Myofilament","B) Sarcomere","C) Myofibril","D) Sarcoplasm","E) Fascicle"],"a":"B) Sarcomere"},
{"q":"33. Thin filaments are primarily made of the protein:","c":["A) Myosin","B) Elastin","C) Collagen","D) Actin","E) Keratin"],"a":"D) Actin"},
{"q":"34. The cytoplasm of a muscle fiber is called:","c":["A) Sarcolemma","B) Sarcoplasm","C) Nucleoplasm","D) Endoplasm","E) Protoplasm"],"a":"B) Sarcoplasm"},
{"q":"35. The expanded chambers of the SR that contain high calcium concentrations are:","c":["A) T tubules","B) Sarcomeres","C) Terminal cisternae","D) Synaptic vesicles","E) Motor end plates"],"a":"C) Terminal cisternae"},
{"q":"36. Peak muscular activity primarily relies on which energy source?","c":["A) Aerobic metabolism","B) Anaerobic glycolysis","C) Myoglobin","D) Fatty acid oxidation","E) Vitamin D"],"a":"B) Anaerobic glycolysis"},
{"q":"37. The 'power stroke' of the myosin head occurs when:","c":["A) ATP binds to the head","B) ADP and phosphate are released","C) Calcium returns to the SR","D) The muscle reaches total fatigue","E) Acetylcholine is neutralized"],"a":"B) ADP and phosphate are released"},
{"q":"38. Which property of muscle describes its ability to recoil to resting length?","c":["A) Excitability","B) Contractility","C) Extensibility","D) Elasticity","E) Irritability"],"a":"D) Elasticity"},
{"q":"39. Skeletal muscle is 'striated' because of:","c":["A) The arrangement of fascicles","B) The overlap of epimysium","C) The arrangement of thick and thin filaments","D) The presence of many nuclei","E) The branching nature of the cells"],"a":"C) The arrangement of thick and thin filaments"},
{"q":"40. When a muscle can no longer perform a required activity, it is said to be:","c":["A) Contracted","B) Excited","C) Fatigued","D) Recovered","E) Extended"],"a":"C) Fatigued"},
{"q":"41. Which of the following is a function of the skeletal system?","c":["A) Production of heat","B) Communication between neurons","C) Blood cell formation","D) Synthesis of Vitamin C","E) Digestion of lipids"],"a":"C) Blood cell formation"},
{"q":"42. Bones that are longer than wide with a shaft are classified as:","c":["A) Short bones","B) Flat bones","C) Long bones","D) Irregular bones","E) Sesamoid bones"],"a":"C) Long bones"},
{"q":"43. Carpals and tarsals are examples of:","c":["A) Long bones","B) Short bones","C) Flat bones","D) Irregular bones","E) Sesamoid bones"],"a":"B) Short bones"},
{"q":"44. Thin layers of compact bone around spongy bone describe:","c":["A) Long bones","B) Flat bones","C) Short bones","D) Irregular bones","E) Sesamoid bones"],"a":"B) Flat bones"},
{"q":"45. The vertebrae are classified as:","c":["A) Long bones","B) Short bones","C) Flat bones","D) Irregular bones","E) Sesamoid bones"],"a":"D) Irregular bones"},
{"q":"46. The shaft of a long bone is called the:","c":["A) Epiphysis","B) Diaphysis","C) Metaphysis","D) Periosteum","E) Endosteum"],"a":"B) Diaphysis"},
{"q":"47. The ends of a long bone that articulate with other bones are the:","c":["A) Diaphysis","B) Epiphyses","C) Medullary cavities","D) Trabeculae","E) Periosteum"],"a":"B) Epiphyses"},
{"q":"48. What covers the outer surface of the epiphyses to decrease friction at joints?","c":["A) Periosteum","B) Endosteum","C) Articular (hyaline) cartilage","D) Yellow marrow","E) Compact bone"],"a":"C) Articular (hyaline) cartilage"},
{"q":"49. The tough fibrous tissue covering the bone (except at articular surfaces) is the:","c":["A) Endosteum","B) Perimysium","C) Periosteum","D) Epimysium","E) Sarcolemma"],"a":"C) Periosteum"},
{"q":"50. Compact bone is characterized by:","c":["A) Its highly branched trabeculae","B) Being found primarily in the epiphysis","C) Tightly packed tissue with no gaps","D) Containing mostly yellow marrow","E) Being flexible and soft"],"a":"C) Tightly packed tissue with no gaps"},
{"q":"51. Spongy bone consists of numerous bony plates called:","c":["A) Osteons","B) Canaliculi","C) Trabeculae","D) Lamellae","E) Lacunae"],"a":"C) Trabeculae"},
{"q":"52. The hollow chamber in the diaphysis of a long bone is the:","c":["A) Epiphyseal plate","B) Medullary cavity","C) Central canal","D) Lacuna","E) Foramen magnum"],"a":"B) Medullary cavity"},
{"q":"53. Which membrane lines the inside of the medullary cavity?","c":["A) Periosteum","B) Epimysium","C) Endosteum","D) Perichondrium","E) Fascia"],"a":"C) Endosteum"},
{"q":"54. Mature bone cells found in lacunae are called:","c":["A) Osteoblasts","B) Osteoclasts","C) Osteocytes","D) Chondrocytes","E) Fibroblasts"],"a":"C) Osteocytes"},
{"q":"55. Large cells that dissolve or break down bone matrix are:","c":["A) Osteocytes","B) Osteoblasts","C) Osteoclasts","D) Osteons","E) Canaliculi"],"a":"C) Osteoclasts"},
{"q":"56. Bone-forming cells are known as:","c":["A) Osteoclasts","B) Osteoblasts","C) Osteocytes","D) Chondroblasts","E) Leukocytes"],"a":"B) Osteoblasts"},
{"q":"57. The basic functional unit of compact bone is the:","c":["A) Trabecula","B) Osteon (Haversian system)","C) Canaliculus","D) Lamella","E) Sarcoplasm"],"a":"B) Osteon (Haversian system)"},
{"q":"58. Tiny canals that transport nutrients between osteocytes are:","c":["A) Central canals","B) Perforating canals","C) Canaliculi","D) Lacunae","E) Fissures"],"a":"C) Canaliculi"},
{"q":"59. What provides bone with its resilience and strength?","c":["A) Inorganic salts","B) Calcium phosphate","C) Collagen fibers","D) Yellow marrow","E) The medullary cavity"],"a":"C) Collagen fibers"},
{"q":"60. What makes bone hard and resistant to crushing?","c":["A) Collagen","B) Inorganic salts (calcium phosphate)","C) Osteoclasts","D) Cartilage","E) Water"],"a":"B) Inorganic salts (calcium phosphate)"},
{"q":"61. Bones that develop from sheet-like layers of connective tissue are called:","c":["A) Endochondral bones","B) Sesamoid bones","C) Intramembranous bones","D) Epiphyseal bones","E) Cartilaginous bones"],"a":"C) Intramembranous bones"},
{"q":"62. Most bones develop from hyaline cartilage models and are called:","c":["A) Intramembranous bones","B) Endochondral bones","C) Flat bones","D) Sutural bones","E) Fibrous bones"],"a":"B) Endochondral bones"},
{"q":"63. The region where growth in length occurs during childhood is the:","c":["A) Diaphysis","B) Medullary cavity","C) Epiphyseal plate","D) Articular cartilage","E) Periosteum"],"a":"C) Epiphyseal plate"},
{"q":"64. Which layer of the epiphyseal plate is closest to the epiphysis?","c":["A) Zone of proliferating cartilage","B) Zone of hypertrophic cartilage","C) Zone of resting cartilage","D) Zone of calcified cartilage","E) Ossified bone"],"a":"C) Zone of resting cartilage"},
{"q":"65. In which zone of the epiphyseal plate do cells undergo rapid mitosis?","c":["A) Zone of resting cartilage","B) Zone of proliferating cartilage","C) Zone of hypertrophic cartilage","D) Zone of calcified cartilage","E) Medullary cavity"],"a":"B) Zone of proliferating cartilage"},
{"q":"66. Bone remodeling involves:","c":["A) Only osteoblasts","B) Only osteocytes","C) Both osteoblasts and osteoclasts","D) Only articular cartilage","E) Red marrow turning into yellow marrow"],"a":"C) Both osteoblasts and osteoclasts"},
{"q":"67. Vitamin D is necessary for the proper absorption of _______ in the small intestine.","c":["A) Protein","B) Vitamin C","C) Calcium","D) Iron","E) Magnesium"],"a":"C) Calcium"},
{"q":"68. What is the result of Vitamin D deficiency in children?","c":["A) Osteomalacia","B) Scurvy","C) Rickets","D) Sarcopenia","E) Osteoporosis"],"a":"C) Rickets"},
{"q":"69. Which hormone stimulates division of cartilage cells in epiphyseal plates?","c":["A) Thyroid hormone","B) Sex hormones","C) Pituitary growth hormone","D) Parathyroid hormone","E) Calcitonin"],"a":"C) Pituitary growth hormone"},
{"q":"70. Physical stress/exercise has what effect on bone?","c":["A) Makes bones thinner and weaker","B) Stimulates bone tissue to thicken and strengthen","C) Prevents calcium absorption","D) Turns red marrow into yellow marrow","E) Has no effect on bone density"],"a":"B) Stimulates bone tissue to thicken and strengthen"},
{"q":"71. Hematopoiesis is the process of:","c":["A) Bone growth","B) Calcium storage","C) Blood cell formation","D) Nerve transmission","E) Muscle contraction"],"a":"C) Blood cell formation"},
{"q":"72. Where does blood cell formation primarily occur in an adult?","c":["A) Yellow bone marrow","B) Medullary cavity of the femur","C) Red bone marrow","D) Periosteum","E) Articular cartilage"],"a":"C) Red bone marrow"},
{"q":"73. Yellow bone marrow is primarily used for:","c":["A) Storing fat (triglycerides)","B) Producing red blood cells","C) Dissolving bone matrix","D) Storing Vitamin C","E) Producing white blood cells"],"a":"A) Storing fat (triglycerides)"},
{"q":"74. When blood calcium is too high, which hormone stimulates osteoblasts?","c":["A) Growth hormone","B) Parathyroid hormone","C) Calcitonin","D) Estrogen","E) Testosterone"],"a":"C) Calcitonin"},
{"q":"75. When blood calcium is low, PTH stimulates which cells to break down bone?","c":["A) Osteoblasts","B) Osteocytes","C) Osteoclasts","D) Chondrocytes","E) Fibroblasts"],"a":"C) Osteoclasts"},
{"q":"76. How many bones are in the average adult human skeleton?","c":["A) 600","B) 126","C) 206","D) 80","E) 300"],"a":"C) 206"},
{"q":"77. The axial skeleton includes which of the following?","c":["A) Pelvic girdle","B) Upper limbs","C) Skull","D) Pectoral girdle","E) Femur"],"a":"C) Skull"},
{"q":"78. The appendicular skeleton consists of:","c":["A) Skull and vertebral column","B) Ribs and sternum","C) Limbs and their attachments (girdles)","D) Hyoid bone and sacrum","E) Only the legs"],"a":"C) Limbs and their attachments (girdles)"},
{"q":"79. The only movable bone in the skull is the:","c":["A) Maxilla","B) Zygomatic bone","C) Mandible","D) Frontal bone","E) Sphenoid bone"],"a":"C) Mandible"},
{"q":"80. The 'soft spots' in an infant's skull are called:","c":["A) Sutures","B) Sinuses","C) Fontanels","D) Foramina","E) Foveae"],"a":"C) Fontanels"},
{"q":"81. Which suture separates the frontal bone from the parietal bones?","c":["A) Sagittal suture","B) Lambdoid suture","C) Coronal suture","D) Squamous suture","E) Metopic suture"],"a":"C) Coronal suture"},
{"q":"82. The large hole at the base of the skull allowing the spinal cord to pass through is the:","c":["A) Foramen ovale","B) Mental foramen","C) Foramen magnum","D) Carotid canal","E) Jugular foramen"],"a":"C) Foramen magnum"},
{"q":"83. Which bone does not articulate with any other bone?","c":["A) Mandible","B) Hyoid bone","C) Ethmoid bone","D) Atlas","E) Patella"],"a":"B) Hyoid bone"},
{"q":"84. The first cervical vertebra (C1) that supports the head is the:","c":["A) Axis","B) Atlas","C) Sacrum","D) Coccyx","E) Prominens"],"a":"B) Atlas"},
{"q":"85. The second cervical vertebra (C2) that allows the head to pivot is the:","c":["A) Atlas","B) Axis","C) Lumbar","D) Thoracic","E) Body"],"a":"B) Axis"},

function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setOrder(s){doShuf=s;document.getElementById('btnOrder').className='tog'+(s?'':' on');document.getElementById('btnShuf').className='tog'+(s?' on':'');}
function show(id){['menu','quiz','results'].forEach(x=>document.getElementById(x).style.display=x===id?'block':'none');}
function showMenu(){show('menu');}

function startQuiz(){
  const sv=document.getElementById('secSel').value;
  let pool=sv==='all'?Q:Q.slice(SECS[+sv][0],SECS[+sv][1]+1);
  let picked=doShuf?shuf(pool):[...pool];
  const n=Math.min(parseInt(document.getElementById('qCount').value)||20,picked.length);
  qs=picked.slice(0,n);cur=0;sel=null;conf=false;score=0;wrongs=[];
  show('quiz');renderQ();
}

function renderQ(){
  const q=qs[cur];
  document.getElementById('qTitle').textContent='Question '+(cur+1)+' of '+qs.length;
  document.getElementById('qSub').textContent='Score: '+score;
  document.getElementById('progFill').style.width=(cur/qs.length*100)+'%';
  document.getElementById('qNum').textContent='Q'+(cur+1)+' / '+qs.length;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('feedback').style.display='none';
  const bc=document.getElementById('choices');bc.innerHTML='';
  q.c.forEach(ch=>{
    const b=document.createElement('button');
    b.className='choice';b.textContent=ch;
    b.onclick=()=>pick(ch);bc.appendChild(b);
  });
  setBtn('btnConfirm',false);setBtn('btnNext',false);
}

function pick(ch){
  if(conf)return;sel=ch;
  document.querySelectorAll('.choice').forEach(b=>{b.className='choice'+(b.textContent===ch?' sel':'');});
  setBtn('btnConfirm',true);
}

function confirm_(){
  if(!sel||conf)return;conf=true;
  const q=qs[cur];const ok=sel===q.a;
  if(ok)score++;else wrongs.push({...q,chosen:sel});
  document.querySelectorAll('.choice').forEach(b=>{
    if(b.textContent===q.a)b.className='choice correct';
    else if(b.textContent===sel&&!ok)b.className='choice wrong';
    else b.className='choice dim';
  });
  const fb=document.getElementById('feedback');
  fb.className='feedback '+(ok?'ok':'no');
  fb.textContent=ok?'✓ Correct!':'✗ Correct answer: '+q.a;
  fb.style.display='block';
  setBtn('btnConfirm',false);setBtn('btnNext',true);
  document.getElementById('btnNext').textContent=cur+1>=qs.length?'Finish →':'Next →';
}

function next_(){
  if(!conf)return;
  if(cur+1>=qs.length){showResults();return;}
  cur++;sel=null;conf=false;renderQ();
}

function setBtn(id,on){
  document.getElementById(id).className='btn-act '+(on?'active':'off');
}

function showResults(){
  show('results');
  const pct=Math.round(score/qs.length*100);
  const ring=document.getElementById('ring');
  ring.style.borderColor=pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
  document.getElementById('ringNum').style.color=pct>=70?'#86efac':pct>=50?'#fcd34d':'#fca5a5';
  document.getElementById('ringNum').textContent=pct+'%';
  document.getElementById('ringFrac').textContent=score+'/'+qs.length;
  document.getElementById('msg').textContent=pct>=80?'Excellent work!':pct>=60?'Good effort — keep studying!':'Keep reviewing — you\'ll get there!';
  const wc=document.getElementById('wrongCard');
  if(wrongs.length>0){
    wc.style.display='block';
    document.getElementById('wrongTitle').textContent='Review — '+wrongs.length+' Incorrect';
    const wl=document.getElementById('wrongList');wl.innerHTML='';
    wrongs.forEach(w=>{
      wl.innerHTML+=`<div class="wrong-item"><div class="wrong-q">${w.q}</div><div class="wrong-c">✗ You chose: ${w.chosen}</div><div class="wrong-a">✓ Correct: ${w.a}</div></div>`;
    });
  }else{wc.style.display='none';}
}

show('menu');
</script>
